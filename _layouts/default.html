<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}

    <link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico?' | relative_url }}" >

    <!-- Pretty social sharing -->
    <meta property="og:title" content="neurodatascience.org" />
    <meta property="og:description" content="An online resource for scientists where neuroscience meets data science" />
    <meta property="og:image" content="https://neurodatascience.org/assets/images/social_preview.png" />
    <meta property="og:url" content="https://neurodatascience.org" />

  {% seo %}
  </head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8773C74LQF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-8773C74LQF');
  </script>

  <body>

    <header>
      <div class="container">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>

        <!-- <section id="downloads">
          {% if site.show_downloads %}
            <a href="{{ site.github.zip_url }}" class="btn">Download as .zip</a>
            <a href="{{ site.github.tar_url }}" class="btn">Download as .tar.gz</a>
          {% endif %}
          <a href="{{ site.github.repository_url }}" class="btn btn-github"><span class="icon"></span>View on GitHub</a>
        </section> -->
      </div>
    </header>

    <main>
    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
   </main>

    <footer style="font-size: 0.8rem;color:grey">Built with &#10084; by <a href="https://kwcooper.xyz" target="_blank">Keiland</a> and the <a href="./neurodatascience-group" target="_blank">UCI Neurodatascience Group</a> | &copy; 2026 </footer>
  </body>
</html>
